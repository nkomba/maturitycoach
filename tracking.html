<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Tracking Dashboard — maturity.coach</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dashboard-container { max-width: 900px; margin: 0 auto; padding: 80px 32px; }
    .dashboard-header { text-align: center; margin-bottom: 60px; }
    .dashboard-header h1 { color: var(--charcoal); margin-bottom: 12px; }
    .dashboard-header p { color: var(--text-muted); font-size: 16px; }
    
    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 48px; }
    .metric-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-sm); }
    .metric-title { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .metric-value { font-family: var(--font-serif); font-size: 42px; color: var(--charcoal); line-height: 1; margin-bottom: 8px; }
    .metric-rate { font-size: 18px; color: var(--text-primary); font-weight: 500; }
    .metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
    
    .sessions-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    .sessions-table th { text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 12px 0; border-bottom: 1px solid var(--border); }
    .sessions-table td { padding: 12px 0; font-size: 14px; color: var(--text-secondary); border-bottom: 1px solid rgba(0,0,0,0.04); }
    .sessions-table tr:last-child td { border-bottom: none; }
    
    .action-buttons { margin-top: 48px; display: flex; justify-content: center; gap: 16px; }
    .btn-reset { background: #c64949; color: white; }
    .btn-reset:hover { background: #a63838; }
    
    @media (max-width: 768px) {
      .metric-grid { grid-template-columns: 1fr; }
      .dashboard-container { padding: 60px 20px; }
    }
  </style>
</head>
<body>

<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Assessment Tracking Dashboard</h1>
    <p>Real-time completion metrics for teaser and full assessments</p>
  </div>

  <div class="metric-grid" id="metricsGrid"></div>

  <div style="background: var(--cream); border-radius: var(--radius-lg); padding: 32px; margin-top: 40px;">
    <h2 style="font-family: var(--font-serif); color: var(--charcoal); margin-bottom: 20px;">Recent Sessions</h2>
    <table class="sessions-table" id="sessionsTable"></table>
  </div>

  <div class="action-buttons">
    <button onclick="refreshMetrics()" class="btn btn-primary">Refresh Metrics</button>
    <button onclick="AssessmentTracking.reset()" class="btn btn-reset">Clear All Data</button>
  </div>
</div>
  <div style="background: var(--cream); border-radius: var(--radius-lg); padding: 32px; margin-top: 40px;">
    <h2 style="font-family: var(--font-serif); color: var(--charcoal); margin-bottom: 20px;">Captured Leads</h2>
    <table class="sessions-table" id="leadsTable"></table>
    <button onclick="exportLeads()" class="btn btn-primary" style="margin-top: 20px;">Export to CSV</button>
  </div>
<script src="js/tracking.js"></script>
<script>
function renderMetrics() {
    var teaser = AssessmentTracking.metrics('teaser');
    var full = AssessmentTracking.metrics('full');

    var html =
        '<div class="metric-card">' +
            '<div class="metric-title">Quick Leadership Check (Teaser)</div>' +
            '<div class="metric-value">' + teaser.started + '</div>' +
            '<div class="metric-rate">' + teaser.rate + ' completion rate</div>' +
            '<div class="metric-sub">' + teaser.completed + ' completed / ' + teaser.started + ' started</div>' +
        '</div>' +
        '<div class="metric-card">' +
            '<div class="metric-title">Full Assessment</div>' +
            '<div class="metric-value">' + full.started + '</div>' +
            '<div class="metric-rate">' + full.rate + ' completion rate</div>' +
            '<div class="metric-sub">' + full.completed + ' completed / ' + full.started + ' started</div>' +
        '</div>';

    document.getElementById('metricsGrid').innerHTML = html;
}

function renderSessions() {
    var data = AssessmentTracking.allData();
    var sessions = data.sessions || [];
    var html = '<thead><tr><th>Date</th><th>Type</th><th>Score</th></tr></thead><tbody>';

    // Show last 20 sessions, newest first
    sessions.slice(-20).reverse().forEach(function(s) {
        html += '<tr><td>' + s.date + '</td><td>' + (s.type === 'teaser' ? 'Quick Check' : 'Full') + '</td><td>' + s.score + '/60</td></tr>';
    });

    html += '</tbody>';
    document.getElementById('sessionsTable').innerHTML = html;
}

function refreshMetrics() {
    renderMetrics();
    renderSessions();
}
function renderLeads() {
    var leads = JSON.parse(localStorage.getItem('maturity_leads') || '[]');
    var html = '<thead><tr><th>Date</th><th>Email</th><th>Type</th><th>Score</th></tr></thead><tbody>';

    leads.slice(-50).reverse().forEach(function(l) {
        html += '<tr><td>' + new Date(l.date).toLocaleDateString() + '</td><td>' + l.email + '</td><td>' + (l.type === 'teaser' ? 'Quick Check' : 'Full') + '</td><td>' + l.score + '</td></tr>';
    });

    html += '</tbody>';
    document.getElementById('leadsTable').innerHTML = html;
}

function exportLeads() {
    var leads = JSON.parse(localStorage.getItem('maturity_leads') || '[]');
    var csv = 'Date,Email,Type,Score\n';
    leads.forEach(function(l) {
        csv += new Date(l.date).toLocaleDateString() + ',' + l.email + ',' + l.type + ',' + l.score + '\n';
    });

    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'maturity-coach-leads.csv';
    a.click();
    URL.revokeObjectURL(url);
}

// Update refreshMetrics to also refresh leads
function refreshMetrics() {
    renderMetrics();
    renderSessions();
    renderLeads();
}
// Initial load
refreshMetrics();
</script>

</body>
</html>
